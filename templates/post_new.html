{{define "content"}}
<section class="form-card">
  <h1>New post</h1>
  <form method="post" action="/post/new">
    <label>Title
      <input type="text" name="title" maxlength="65" required>
    </label>
    <label>Content
      <textarea name="content" rows="8" required></textarea>
    </label>
    <fieldset>
      <legend>Categories</legend>
      <div class="checkbox-grid">
        {{range $i, $c := .Categories}}
          <label class="checkbox">
            <input type="checkbox" name="categories"  {{if eq $i 0}}checked {{end}} value="{{$c.ID}}">
            <span>{{$c.Name}}</span>
          </label>
        {{end}}
      </div>
    </fieldset>
    <button type="submit" class="primary">Publish</button>
    {{if .FormError}}
      <p class="form-error">{{.FormError}}</p>
    {{end}}
  </form>
</section>
{{end}}
